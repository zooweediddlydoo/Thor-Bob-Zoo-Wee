<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thor & Pearl Co. | Minimalist Pet Goods</title>
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #f2f2f2;
            --border: #e0e0e0;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            cursor: pointer;
        }

        .nav-links button {
            background: none;
            border: 1px solid var(--text);
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links button:hover {
            background: var(--text);
            color: var(--bg);
        }

        /* Hero / Categories Section */
        header {
            padding: 4rem 2rem;
            text-align: center;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            max-width: 1000px;
            margin: 2rem auto;
        }

        .cat-card {
            border: 1px solid var(--text);
            padding: 2rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .cat-card:hover {
            background: var(--accent);
        }

        /* Product Grid */
        .products-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            position: relative;
            border: 1px solid var(--border);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #fafafa;
        }

        .product-image-placeholder {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .product-info {
            text-align: center;
        }

        /* The Pop-up Overlay on Hover */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--transition);
            padding: 20px;
            text-align: center;
        }

        .product-card:hover .overlay {
            opacity: 1;
        }

        .overlay h3 {
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .overlay p {
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .btn-view {
            border: 1px solid white;
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-size: 0.8rem;
        }

        footer {
            text-align: center;
            padding: 4rem;
            font-size: 0.7rem;
            color: #888;
            border-top: 1px solid var(--border);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showHome()">THOR & PEARL CO.</div>
        <div class="nav-links">
            <button onclick="showHome()">HOME</button>
        </div>
    </nav>

    <section id="home-page">
        <header>
            <h1>ESSENTIALS FOR THE MODERN PET</h1>
            <p>Thoughtfully designed. Minimalist aesthetic.</p>
        </header>

        <div class="category-grid">
            <div class="cat-card" onclick="showCategory('Rest')">Rest & Sleep</div>
            <div class="cat-card" onclick="showCategory('Play')">Interactive Play</div>
            <div class="cat-card" onclick="showCategory('Style')">Signature Style</div>
        </div>
    </section>

    <section id="shop-page" class="hidden">
        <header>
            <h2 id="category-title">CATEGORY</h2>
            <p>Discover our curated selection.</p>
        </header>

        <div class="products-container" id="product-list">
            </div>
    </section>

    <footer>
        &copy; 2024 THOR & PEARL CO. ALL RIGHTS RESERVED.
    </footer>

    <script>
        const products = [
            { id: 1, cat: 'Rest', name: 'Cloud Pillow', desc: 'Ergonomic memory foam for deep REM sleep.', price: '$45' },
            { id: 2, cat: 'Rest', name: 'Bouclé Snuggle Pad', desc: 'On-trend textured fabric for modern interiors.', price: '$60' },
            { id: 3, cat: 'Play', name: 'Monochrome Rope', desc: 'Hand-dyed cotton for heavy chewers.', price: '$22' },
            { id: 4, cat: 'Play', name: 'Marble Rubber Bone', desc: 'Minimalist aesthetic meets durable design.', price: '$18' },
            { id: 5, cat: 'Style', name: 'Vegan Leather Lead', desc: 'Sleek black hardware with reinforced stitching.', price: '$35' },
            { id: 6, cat: 'Style', name: 'Matte Ceramic Bowl', desc: 'Heavyweight design to prevent spills.', price: '$28' }
        ];

        function showHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('shop-page').classList.add('hidden');
        }

        function showCategory(category) {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('shop-page').classList.remove('hidden');
            document.getElementById('category-title').innerText = category;

            const list = document.getElementById('product-list');
            list.innerHTML = '';

            const filtered = products.filter(p => p.cat === category);

            filtered.forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <div class="product-image-placeholder">●</div>
                        <div class="product-info">
                            <strong>${p.name}</strong>
                            <p>${p.price}</p>
                        </div>
                        <div class="overlay">
                            <h3>${p.name}</h3>
                            <p>${p.desc}</p>
                            <a href="#" class="btn-view">QUICK ADD</a>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
