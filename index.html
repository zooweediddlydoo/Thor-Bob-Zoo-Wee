<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #111;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 1rem;
      background: #222;
      padding: 0.5rem;
    }
    nav button {
      background: white;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 6px;
    }
    .container {
      padding: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .card {
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      border-radius: 8px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .modal-content img {
      width: 100%;
      border-radius: 8px;
    }
    .close-btn {
      background: red;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 1rem;
    }
    .modal-content select, .modal-content input {
      margin-top: 0.5rem;
      padding: 0.5rem;
      width: 80%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .add-cart {
      background: black;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      margin-top: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #111;
      color: white;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Shop</h1>
    <p>Simple Store Starter</p>
  </header>

  <nav>
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('clothing')">Clothing</button>
    <button onclick="filterProducts('tech')">Tech</button>
    <button onclick="filterProducts('other')">Other</button>
  </nav>

  <div class="container">
    <div class="grid" id="productGrid"></div>
  </div>

  <!-- Modal for product details -->
  <div class="modal" id="productModal">
    <div class="modal-content" id="modalContent">
      <img id="modalImg" src="" />
      <h2 id="modalName"></h2>
      <p id="modalDesc"></p>
      <p id="modalPrice"></p>
      <div id="sizeSelectContainer"></div>
      <input type="number" id="modalQuantity" min="1" value="1"/>
      <button class="add-cart" onclick="alert('Added to cart (placeholder)')">Add to Cart</button>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <footer>
    <p>© 2026 My Shop</p>
  </footer>

  <script>
    const products = [
      { name: "T-Shirt", category: "clothing", price: "$20", img: "https://via.placeholder.com/200", desc: "Comfortable cotton T-shirt", sizes: ["S","M","L","XL"] },
      { name: "Jacket", category: "clothing", price: "$60", img: "https://via.placeholder.com/200", desc: "Warm winter jacket", sizes: ["S","M","L","XL"] },
      { name: "Sneakers", category: "clothing", price: "$80", img: "https://via.placeholder.com/200", desc: "Stylish sneakers", sizes: ["7","8","9","10","11"] },
      { name: "Laptop", category: "tech", price: "$999", img: "https://via.placeholder.com/200", desc: "Powerful laptop for work and gaming" },
      { name: "Headphones", category: "tech", price: "$50", img: "https://via.placeholder.com/200", desc: "High-quality over-ear headphones" },
      { name: "Smartwatch", category: "tech", price: "$150", img: "https://via.placeholder.com/200", desc: "Track your fitness and notifications" },
      { name: "Coffee Mug", category: "other", price: "$12", img: "https://via.placeholder.com/200", desc: "Ceramic mug for your morning coffee" },
      { name: "Notebook", category: "other", price: "$8", img: "https://via.placeholder.com/200", desc: "100-page lined notebook" },
      { name: "Water Bottle", category: "other", price: "$15", img: "https://via.placeholder.com/200", desc: "Reusable stainless steel bottle" }
    ];

    const grid = document.getElementById('productGrid');
    const modal = document.getElementById('productModal');
    const modalImg = document.getElementById('modalImg');
    const modalName = document.getElementById('modalName');
    const modalDesc = document.getElementById('modalDesc');
    const modalPrice = document.getElementById('modalPrice');
    const sizeSelectContainer = document.getElementById('sizeSelectContainer');
    const modalQuantity = document.getElementById('modalQuantity');

    function displayProducts(list) {
      grid.innerHTML = "";
      list.forEach((p, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${p.img}" />
          <h3>${p.name}</h3>
          <p>${p.price}</p>
        `;
        card.addEventListener('click', () => openModal(p));
        grid.appendChild(card);
      });
    }

    function filterProducts(category) {
      if (category === 'all') {
        displayProducts(products);
      } else {
        displayProducts(products.filter(p => p.category === category));
      }
    }

    function openModal(product) {
      modal.style.display = 'flex';
      modalImg.src = product.img;
      modalName.textContent = product.name;
      modalDesc.textContent = product.desc;
      modalPrice.textContent = product.price;
      modalQuantity.value = 1;

      if(product.sizes){
        sizeSelectContainer.innerHTML = `<select id="modalSize">${product.sizes.map(s => `<option>${s}</option>`).join('')}</select>`;
      } else {
        sizeSelectContainer.innerHTML = "";
      }
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    // Close modal if clicking outside content
    modal.addEventListener('click', e => {
      if(e.target === modal) closeModal();
    });

    displayProducts(products);
  </script>
</body>
</html>
