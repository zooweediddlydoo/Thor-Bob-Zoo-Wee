<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thor & Pearl Co. | Friendly Finds</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #f9f9f9;
            --border: #333333;
            --font-main: 'Lora', serif;
            --font-heading: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* Nav */
        nav {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text);
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-links button {
            background: none;
            border: 1px solid var(--text);
            padding: 8px 15px;
            margin-left: 10px;
            cursor: pointer;
            font-family: var(--font-main);
            transition: 0.2s;
        }

        .nav-links button:hover {
            background: var(--text);
            color: white;
        }

        /* Hero */
        header {
            padding: 6rem 2rem;
            text-align: center;
            background-color: var(--accent);
        }

        header h1 {
            font-family: var(--font-heading);
            font-size: 3.2rem;
            margin-bottom: 1rem;
        }

        /* Categories */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: -3rem auto 4rem;
            padding: 0 20px;
        }

        .cat-card {
            background: white;
            border: 2px solid var(--text);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--text);
            transition: 0.2s;
        }

        .cat-card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0px var(--text);
        }

        /* Products */
        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .product-card {
            cursor: pointer;
            text-align: center;
            border: 1px solid transparent;
            padding: 15px;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: #eee;
        }

        .img-box {
            border: 2px solid var(--text);
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 15px;
            background: white;
        }

        /* Modal Details */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 3px solid var(--text);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        select, .add-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 2px solid var(--text);
            font-family: var(--font-main);
            font-weight: bold;
            cursor: pointer;
        }

        .add-btn { background: var(--text); color: white; }

            right: -100%;
            top: 0;
            width: 3
