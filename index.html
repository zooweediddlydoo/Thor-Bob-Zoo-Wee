<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thor & Pearl Co. | Friendly Finds</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #f9f9f9;
            --border: #333333;
            --font-main: 'Lora', serif;
            --font-heading: 'Playfair Display', serif;
            --btn-shadow: 0 4px 0px var(--text);
            --btn-shadow-hover: 0 8px 0px var(--text);
            --sparkle-color: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* --- 3D DYNAMIC BUTTONS --- */
        button, .cat-card, .size-tile, .thumb-item, .back-btn-box {
            cursor: pointer;
            transition: all 0.2s ease-out;
            border: 2px solid var(--text);
            border-radius: 10px;
            background: white;
            font-family: var(--font-main);
            box-shadow: var(--btn-shadow);
            position: relative;
            top: 0;
        }

        button:hover, .cat-card:hover, .size-tile:hover, .thumb-item:hover, .back-btn-box:hover {
            top: -4px;
            box-shadow: var(--btn-shadow-hover);
        }

        /* --- SPARKLE EFFECT --- */
        .sparkle-container { position: relative; display: inline-block; }
        
        .product-card.discounted:hover .img-box::after {
            content: '✨';
            position: absolute;
            animation: sparkle-anim 0.6s infinite alternate;
            font-size: 2rem;
            top: -10px;
            right: -10px;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.3) rotate(20deg); opacity: 0.7; }
        }

        /* Nav */
        nav {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text);
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .logo { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 700; cursor: pointer; font-style: italic; }

        /* Banner */
        .promo-banner {
            background: var(--text);
            color: white;
            padding: 20px;
            text-align: center;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--text);
        }

        /* Home Page Split Layout */
        .home-hero { display: flex; min-height: 60vh; border-bottom: 2px solid var(--text); }
        .hero-side { flex: 1; padding: 5rem 10%; display: flex; flex-direction: column; justify-content: center; }
        .hero-left { background-color: var(--accent); border-right: 2px solid var(--text); position: relative; }
        .hero-right h1 { font-family: var(--font-heading); font-size: 3.5rem; margin-bottom: 1rem; }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 20px;
        }

        .cat-card { padding: 60px 20px; text-align: center; font-family: var(--font-heading); font-weight: 700; font-size: 1.4rem; }
